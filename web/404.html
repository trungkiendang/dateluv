<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="dark">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0F0518;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container { padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #FF6B9D; }
    p { color: #9E86A2; margin-bottom: 2rem; }
    a {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #FF6B9D;
      color: #fff;
      text-decoration: none;
      border-radius: 16px;
      font-weight: 700;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.8; }
  </style>
  <script>
    sessionStorage.redirect = location.href;
  </script>
  <meta http-equiv="refresh" content="0;URL='/'">
</head>
<body>
  <div class="container">
    <h1>✨ DateLuv</h1>
    <p>Đang chuyển hướng đến ứng dụng...</p>
    <a href="/">Vào DateLuv</a>
  </div>
</body>
</html>
