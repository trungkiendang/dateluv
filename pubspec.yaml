name: date_luv
description: "DateLuv - Ứng dụng kỷ niệm tình yêu dành cho các cặp đôi"
publish_to: 'none'

version: 1.1.0+3

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.6.2

  # Image Picker
  image_picker: ^1.1.2

  # Local Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Lottie animations
  lottie: ^3.3.1

  # Google Fonts
  google_fonts: ^6.2.1

  # Permissions
  permission_handler: ^11.3.1

  # Share
  share_plus: ^10.1.4

  # Date formatting
  intl: ^0.20.2

  # Path provider
  path_provider: ^2.1.5

  # Staggered grid view (gallery)
  flutter_staggered_grid_view: ^0.7.0

  # Image caching
  cached_network_image: ^3.4.1

  # UUID for IDs
  uuid: ^4.5.1

  # Local auth (biometrics)
  local_auth: ^2.3.0

  # Smooth page indicator
  smooth_page_indicator: ^1.2.0+3

  # Flutter SVG
  flutter_svg: ^2.0.17

  # Timeline tile
  timeline_tile: ^2.0.0

  # Photo view
  photo_view: ^0.15.0

  # Dotted border
  dotted_border: ^2.1.0

  # Shimmer loading
  shimmer: ^3.0.0

  # Screenshot capture
  screenshot: ^3.0.0

  # Animated text kit
  animated_text_kit: ^4.2.3

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  google_sign_in: ^6.2.2

  # Connectivity
  connectivity_plus: ^6.1.3
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1A0A2E"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  web:
    generate: false

flutter_native_splash:
  color: "#0F0518"
  image: "assets/icons/app_icon.png"
  color_dark: "#0F0518"
  android: true
  ios: true
  android_12:
    image: "assets/icons/app_icon.png"
    color: "#0F0518"
    icon_background_color: "#0F0518"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
